<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Organization Chart</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- D3.js and D3 Org Chart -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-org-chart@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-flextree@2.1.2/build/d3-flextree.js"></script>
    
    <!-- PapaParse for Google Sheet CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            overflow: hidden;
        }

        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            color: #1f2937;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #4338ca;
        }

        .chart-container {
            width: 100%;
            height: 100vh;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            font-weight: 600;
            color: #4b5563;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Organization Chart</h1>
        <div class="controls">
            <button onclick="chart.fit()">Fit to Screen</button>
            <button onclick="chart.expandAll()">Expand All</button>
            <button onclick="chart.collapseAll()">Collapse All</button>
        </div>
    </div>

    <div id="loading">Loading Data from Google Sheets...</div>
    <div class="chart-container"></div>

    <script>
        let chart = null;

        // Data Source Mapping based on Requirements:
        // Full Name -> Employee name
        // Current Designation -> Hierarchy level
        // Current Department -> Branch (last)
        // Functions -> Branch (second)
        // Phase -> Branch (first)
        // Path: Root -> Phase -> Function -> Department -> Designation -> Employee
        
        const googleSheetCsvUrl = "https://docs.google.com/spreadsheets/d/1tYcnCUG6CiYVEE1Ihg3zBCF-OYzHh7NapK5rTfbq4C4/export?format=csv";

        Papa.parse(googleSheetCsvUrl, {
            download: true,
            header: true,
            complete: function(results) {
                document.getElementById('loading').style.display = 'none';
                try {
                    const data = results.data;
                    const nodes = processData(data);
                    renderChart(nodes);
                } catch(e) {
                    document.getElementById('loading').style.display = 'block';
                    document.getElementById('loading').innerText = 'Error processing data. Check console.';
                    console.error(e);
                }
            },
            error: function(err) {
                document.getElementById('loading').innerText = 'Failed to load data. Is the link accessible?';
                console.error(err);
            }
        });

        function cleanString(str) {
            return str ? str.trim().replace(/\s+/g, ' ') : "Unknown";
        }

        function processData(data) {
            const nodes = [];
            const nodeMap = new Set();
            
            // Add root node
            nodes.push({ id: "Root", parentId: null, name: "Company", type: "root" });
            nodeMap.add("Root");
            
            data.forEach(row => {
                const name = cleanString(row["Full Name"]);
                if (!name || name === "Unknown") return; // Skip empty rows

                const phase = cleanString(row["Phase"]);
                const func = cleanString(row["Functions"]);
                const dept = cleanString(row["Current Department"]);
                const desig = cleanString(row["Current Designation"]);
                
                // Safe unique IDs for hierarchy
                const phaseId = `Phase_${phase}`;
                const funcId = `${phaseId}_Func_${func}`;
                const deptId = `${funcId}_Dept_${dept}`;
                const desigId = `${deptId}_Desig_${desig}`;
                const empId = `Emp_${row["Employee Id"] || name}`; 
                
                // 1. Phase Node
                if (!nodeMap.has(phaseId)) {
                    nodes.push({ id: phaseId, parentId: "Root", name: phase, type: "phase" });
                    nodeMap.add(phaseId);
                }
                
                // 2. Function Node
                if (!nodeMap.has(funcId)) {
                    nodes.push({ id: funcId, parentId: phaseId, name: func, type: "function" });
                    nodeMap.add(funcId);
                }
                
                // 3. Department Node
                if (!nodeMap.has(deptId)) {
                    nodes.push({ id: deptId, parentId: funcId, name: dept, type: "department" });
                    nodeMap.add(deptId);
                }
                
                // 4. Designation Node
                if (!nodeMap.has(desigId)) {
                    nodes.push({ id: desigId, parentId: deptId, name: desig, type: "designation" });
                    nodeMap.add(desigId);
                }
                
                // 5. Employee Node
                if (!nodeMap.has(empId)) {
                    nodes.push({ 
                        id: empId, 
                        parentId: desigId, 
                        name: name,
                        designation: desig,
                        department: dept,
                        type: "employee" 
                    });
                    nodeMap.add(empId);
                }
            });
            
            return nodes;
        }

        function renderChart(data) {
            chart = new d3.OrgChart()
                .container('.chart-container')
                .data(data)
                .nodeWidth(d => 250)
                .initialZoom(0.7)
                .nodeHeight(d => d.data.type === 'employee' ? 120 : 100)
                .childrenMargin(d => 40)
                .compactMarginBetween(d => 15)
                .compactMarginPair(d => 80)
                .nodeContent(function(d, i, arr, state) {
                    let color = '#FFFFFF';
                    let title = '';
                    
                    switch(d.data.type) {
                        case 'root': color = '#111827'; title = 'ROOT'; break;
                        case 'phase': color = '#059669'; title = 'PHASE'; break;
                        case 'function': color = '#ca8a04'; title = 'FUNCTION'; break;
                        case 'department': color = '#7c3aed'; title = 'DEPARTMENT'; break;
                        case 'designation': color = '#dc2626'; title = 'DESIGNATION'; break;
                        case 'employee': color = '#2563eb'; title = 'EMPLOYEE'; break;
                    }
                    
                    return `
                    <div style="font-family: 'Inter', sans-serif; background-color: #ffffff; width: ${d.width}px; height: ${d.height}px; border-radius: 8px; border-top: 5px solid ${color}; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); display: flex; flex-direction: column; justify-content: center; padding: 15px; box-sizing: border-box;">
                        <div style="font-size: 11px; color: ${color}; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 5px;">${title}</div>
                        <div style="font-size: 16px; font-weight: 700; color: #1f2937; margin-bottom: ${d.data.type === 'employee' ? '4px' : '0'}; word-break: break-word; line-height: 1.2;">
                            ${d.data.name}
                        </div>
                        ${d.data.type === 'employee' ? `
                            <div style="font-size: 13px; color: #4b5563; font-weight: 500;">${d.data.designation || ''}</div>
                            <div style="font-size: 12px; color: #9ca3af; margin-top: 2px;">${d.data.department || ''}</div>
                        ` : ''}
                    </div>
                    `;
                })
                .render();
                
            // Wait a moment for rendering, then expand to desired default level and fit
            setTimeout(() => {
                chart.expandAll().fit();
            }, 100);
        }
    </script>
</body>
</html>
