<!DOCTYPE html>
<html>
<head>
    <title>Organizational Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/orgchart@3.1.0/dist/orgchart.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/orgchart@3.1.0/dist/orgchart.min.css">
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        #tree {
            width: 100%;
            height: 600px; /* Set a fixed height for the chart container */
            background-color: #f7f7f7;
            border: 1px solid #ccc;
        }
        .orgchart .node .title {
            background-color: #006699;
            color: #fff;
            padding: 8px 12px;
            font-weight: bold;
            font-size: 14px;
        }
        .orgchart .node .content {
            border-color: #006699;
            padding: 6px 12px;
            background-color: #f0f0f0;
            font-size: 12px;
        }
        /* Style for intermediate nodes (Phase, Function, Department) */
        .orgchart .node[data-title="Phase"] .title,
        .orgchart .node[data-title="Function"] .title,
        .orgchart .node[data-title="Department"] .title {
            background-color: #4CAF50; /* Green for structural nodes */
            font-size: 13px;
        }
         .orgchart .node[data-title="Phase"] .content,
        .orgchart .node[data-title="Function"] .content,
        .orgchart .node[data-title="Department"] .content {
            border-color: #4CAF50;
        }
        /* Style for the root node */
        .orgchart .node[data-title="Company Hierarchy"] .title {
            background-color: #FF5722; /* Orange for root node */
        }
         .orgchart .node[data-title="Company Hierarchy"] .content {
            border-color: #FF5722;
        }
    </style>
</head>
