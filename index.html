<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaada Organization Chart</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- D3.js and D3 Org Chart -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-org-chart@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-flextree@2.1.2/build/d3-flextree.js"></script>
    <!-- PapaParse for Google Sheet CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --box-bg: #1e1e1e;
            --box-shadow: rgba(0, 255, 255, 0.2);
            --neon-line: #00ffff;
            --text-heading: #00ffff;
            --text-sub: #a0a0a0;
        }

        body.light-theme {
            --bg-color: #f3f4f6;
            --text-color: #1f2937;
            --box-bg: #ffffff;
            --box-shadow: rgba(0, 0, 0, 0.1);
            --neon-line: #4f46e5;
            --text-heading: #4f46e5;
            --text-sub: #4b5563;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            transition: background-color 0.3s;
        }

        .header {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: var(--box-bg); padding: 15px 25px;
            border-radius: 8px; box-shadow: 0 4px 10px var(--box-shadow);
            color: var(--text-color);
            transition: all 0.3s;
            border: 1px solid var(--neon-line);
        }

        .header h1 {
            margin: 0 0 10px 0; font-size: 24px;
        }

        .controls {
            display: flex; gap: 10px;
        }

        button {
            padding: 8px 16px; background-color: var(--neon-line);
            color: #000; border: none; border-radius: 6px;
            cursor: pointer; font-weight: 600;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            background-color: #00cccc;
        }

        .chart-container {
            width: 100%; height: 100vh;
        }

        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px; font-weight: 600;
            color: var(--neon-line);
            text-shadow: 0 0 10px var(--neon-line);
        }

        /* SVG Neon styles */
        .svg-chart-container .link {
            stroke: var(--neon-line) !important;
            filter: drop-shadow(0 0 5px var(--neon-line));
        }

        .theme-btn {
            background-color: #ffffff;
            color: #000000;
            font-size: 11px;
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Avaada Organization Chart</h1>
        <div class="controls">
            <button onclick="chart.fit()">Fit to Screen</button>
            <button onclick="chart.expandAll()">Expand All</button>
            <button onclick="chart.collapseAll()">Collapse All</button>
        </div>
    </div>

    <div id="loading">Loading Data...</div>
    <div class="chart-container"></div>

    <script>
        // --- OBFUSCATED STRINGS ---
        // Base64 Encoded URLs and Keys to obscure them from simple scraping
        const urls = {
            mainUrl: window.atob("aHR0cHM6Ly9kb2NzLmdvb2dsZS5jb20vc3ByZWFkc2hlZXRzL2QvMXRZY25DVUc2Q2lZVkVFMUloZzN6QkNGLU9ZekhoN05hcEs1clRmYnE0QzQvZXhwb3J0P2Zvcm1hdD1jc3Y="),
            // User: Update the GIDs below if your 'power' and 'vacancy' worksheets have different IDs.
            // By default, this appends &gid=YOUR_GID
            powerUrlParams: window.atob("JmdpZD0xMjM0NTY3ODkw"), // e.g. &gid=1234567890
            vacancyUrlParams: window.atob("JmdpZD0wOTg3NjU0MzIx")  // e.g. &gid=0987654321
        };

        const keys = {
            name: window.atob("RnVsbCBOYW1l"), // "Full Name"
            desig: window.atob("Q3VycmVudCBEZXNpZ25hdGlvbg=="), // "Current Designation"
            dept: window.atob("Q3VycmVudCBEZXBhcnRtZW50"), // "Current Department"
            empId: window.atob("RW1wbG95ZWUgSWQ="), // "Employee Id"
            reportTo: window.atob("UmVwb3J0aW5nIE1hbmFnZXIgTmFtZQ=="), // "Reporting Manager Name"
            
            p_desig: window.atob("ZGVzaWduYXRpb24="), // "designation"
            p_level: window.atob("bGV2ZWw="), // "level"
            p_corr: window.atob("Y29ycmVzcG9uZGluZw=="), // "corresponding"

            v_dept: window.atob("ZGVwYXJ0bWVudA=="), // "department"
            v_desig: window.atob("ZGVzaWduYXRpb24="), // "designation"
            v_count: window.atob("Y291bnQ=") // "count"
        };
        // --- END OBFUSCATED STRINGS ---

        let chart = null;

        // Toggle Theme Logic
        window.toggleTheme = function(e) {
            if(e) e.stopPropagation();
            document.body.classList.toggle('light-theme');
            if(chart) chart.render();
        }

        function cleanString(str) {
            return str ? str.trim().replace(/\s+/g, ' ') : "Unknown";
        }

        // Helper to parse CSV using promises
        function fetchCsv(url) {
            return new Promise((resolve, reject) => {
                Papa.parse(url, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: results => resolve(results.data),
                    error: err => reject(err)
                });
            });
        }

        async function loadData() {
            try {
                // Fetch Main Data
                const empData = await fetchCsv(urls.mainUrl);
                
                // Fetch Power Data (we try with placeholder, if fails we provide empty array or mock)
                let powerData = [];
                try {
                    powerData = await fetchCsv(urls.mainUrl.split('&')[0] + urls.powerUrlParams);
                } catch(e) { console.warn("Power sheet not found with provided GID. Adjust GID or use main data."); }

                // Fetch Vacancy Data
                let vacancyData = [];
                try {
                    vacancyData = await fetchCsv(urls.mainUrl.split('&')[0] + urls.vacancyUrlParams);
                } catch(e) { console.warn("Vacancy sheet not found with provided GID. Adjust GID or use main data."); }

                document.getElementById('loading').style.display = 'none';

                const nodes = processData(empData, powerData, vacancyData);
                renderChart(nodes);

            } catch (error) {
                document.getElementById('loading').innerText = window.atob('RXJyb3IgbG9hZGluZyBkYXRhLiBDaGVjayBjb25zb2xlLg=='); // "Error loading data. Check console."
                console.error(error);
            }
        }

        function processData(empData, powerData, vacancyData) {
            const nodes = [];
            const powerDict = {};
            
            // 1. Process Power Dict
            powerData.forEach(row => {
                const des = cleanString(row[keys.p_desig]);
                if(des !== "Unknown") {
                    powerDict[des] = {
                        level: parseInt(row[keys.p_level]) || 99,
                        corr: cleanString(row[keys.p_corr])
                    };
                }
            });

            // 2. Identify Employees
            const empDict = {};
            let rootEmp = null;

            empData.forEach(row => {
                const name = cleanString(row[keys.name]);
                if (!name || name === "Unknown") return;

                const desig = cleanString(row[keys.desig]);
                const dept = cleanString(row[keys.dept]);
                const empId = cleanString(row[keys.empId]);
                const reportTo = cleanString(row[keys.reportTo]);
                
                const levelInfo = powerDict[desig];
                const level = levelInfo ? levelInfo.level : 99;

                const obj = {
                    id: empId !== 'Unknown' ? empId : name,
                    parentId: reportTo !== 'Unknown' ? reportTo : null,
                    name: name,
                    designation: desig,
                    department: dept,
                    level: level,
                    reportToStr: reportTo,
                    type: "employee",
                    actualReportees: 0,
                    actualVacancies: 0
                };
                
                empDict[obj.id] = obj;
                // Also map name to ID just in case reporting manager uses names
                empDict[`NAME_${name}`] = obj;

                // Level 1 logic
                if (level === 1) {
                    rootEmp = obj;
                }
            });

            // If no explicit Level 1 found, pick the first employee without a visible manager
            if (!rootEmp) {
                rootEmp = Object.values(empDict).find(e => !e.reportToStr || e.reportToStr === "Unknown" || !empDict[`NAME_${e.reportToStr}`]) || Object.values(empDict)[0];
            }

            // Create Root Node (Avaada Nagpur Plant)
            nodes.push({
                id: "Root",
                parentId: null,
                name: "Avaada (Nagpur Plant)",
                designation: rootEmp.designation,
                empName: rootEmp.name,
                empId: rootEmp.id,
                department: rootEmp.department,
                type: "root",
                actualReportees: 0,
                actualVacancies: 0
            });

            // Relink employees
            Object.values(empDict).forEach(emp => {
                if (!emp.id || emp.id.startsWith("NAME_")) return;

                if (emp.id === rootEmp.id) {
                    // Skip adding the root employee as a separate node since they are embedded in Root
                    return; 
                }

                // Find manager
                let managerId = "Root"; // Default to root
                if (emp.reportToStr && emp.reportToStr !== "Unknown") {
                    if (empDict[emp.reportToStr]) {
                        managerId = empDict[emp.reportToStr].id;
                    } else if (empDict[`NAME_${emp.reportToStr}`]) {
                        managerId = empDict[`NAME_${emp.reportToStr}`].id;
                    }
                }
                
                // If manager is the root manager, point to Root Node instead
                if(managerId === rootEmp.id) {
                    managerId = "Root";
                }

                emp.parentId = managerId;
                nodes.push(emp);
            });

            // 3. Process Vacancies
            let vIndex = 0;
            vacancyData.forEach(row => {
                const dep = cleanString(row[keys.v_dept]);
                const des = cleanString(row[keys.v_desig]);
                const count = parseInt(row[keys.v_count]) || 0;

                if(count > 0 && dep !== "Unknown") {
                    // Try to attach vacancy to someone in that department
                    let parentForVacancy = "Root";
                    
                    // Look for the manager in that department based on power levels or just any node in department
                    const deptMembers = nodes.filter(n => n.department === dep && n.type === 'employee');
                    if(deptMembers.length > 0) {
                        // find highest ranking in that department
                        deptMembers.sort((a,b) => (a.level || 99) - (b.level || 99));
                        parentForVacancy = deptMembers[0].id;
                    }

                    nodes.push({
                        id: `Vacancy_${vIndex++}`,
                        parentId: parentForVacancy,
                        name: "Position Vacant",
                        designation: des,
                        department: dep,
                        type: "vacancy",
                        vacantCount: count,
                        actualReportees: 0,
                        actualVacancies: count
                    });
                }
            });

            // Compute Rollups (vacancies and reportees) bottom up
            const lookup = {};
            nodes.forEach(n => {
                lookup[n.id] = n;
                n.childrenIds = [];
            });
            nodes.forEach(n => {
                if (n.parentId && lookup[n.parentId]) {
                    lookup[n.parentId].childrenIds.push(n.id);
                }
            });

            function computeMetrics(nodeId) {
                const node = lookup[nodeId];
                let reportees = 0;
                let vacs = node.type === 'vacancy' ? node.vacantCount : 0;
                
                node.childrenIds.forEach(cid => {
                    const child = lookup[cid];
                    const childMet = computeMetrics(cid);
                    reportees += childMet.r + (child.type === 'employee' ? 1 : 0);
                    vacs += childMet.v;
                });

                node.actualReportees = reportees;
                node.actualVacancies = vacs;
                
                return { r: reportees, v: vacs };
            }

            computeMetrics("Root");

            return nodes;
        }

        function renderChart(data) {
            chart = new d3.OrgChart()
                .container('.chart-container')
                .data(data)
                .nodeWidth(d => d.data.type === 'root' ? 320 : 260)
                .nodeHeight(d => d.data.type === 'root' ? 170 : 130)
                .childrenMargin(d => 50)
                .compactMarginBetween(d => 25)
                .compactMarginPair(d => 50)
                .nodeContent(function (d, i, arr, state) {
                    const isDark = !document.body.classList.contains('light-theme');
                    const bgColor = isDark ? '#1e1e1e' : '#ffffff';
                    const textColor = isDark ? '#ffffff' : '#1f2937';
                    const subColor = isDark ? '#a0a0a0' : '#4b5563';
                    const neon = isDark ? '#00ffff' : '#4f46e5';
                    
                    let strokeColor = neon;
                    if(d.data.type === 'vacancy') strokeColor = '#dc2626';

                    const reporteeStr = d.data.actualReportees > 0 ? `<div style="font-size:11px; margin-top:5px; color:${neon}">👥 Total Reportees: ${d.data.actualReportees}</div>` : '';
                    const vacancyStr = d.data.actualVacancies > 0 ? `<div style="font-size:11px; margin-top:2px; color:#ff4444">⚠️ Dept Vacancies: ${d.data.actualVacancies}</div>` : '';

                    if (d.data.type === 'root') {
                        return `
                        <div style="font-family: 'Inter', sans-serif; background-color: ${bgColor}; width: ${d.width}px; height: ${d.height}px; border-radius: 10px; border: 2px solid ${strokeColor}; box-shadow: 0 0 15px rgba(0,255,255,0.3); display: flex; flex-direction: column; justify-content: center; padding: 15px; box-sizing: border-box; text-align: center;">
                            <div style="font-size: 18px; font-weight: 700; color: ${textColor}; margin-bottom: 5px;">${d.data.name}</div>
                            <div style="font-size: 14px; font-weight: 600; color: ${neon};">${d.data.designation || ''}</div>
                            <div style="font-size: 13px; color: ${subColor}; margin-top: 5px;">${d.data.empName || ''} (ID: ${d.data.empId || ''})</div>
                            ${reporteeStr}
                            ${vacancyStr}
                            <button class="theme-btn" onclick="toggleTheme(event)">Toggle Theme (Light/Dark)</button>
                        </div>`;
                    }

                    if (d.data.type === 'vacancy') {
                        return `
                        <div style="font-family: 'Inter', sans-serif; background-color: ${bgColor}; width: ${d.width}px; height: ${d.height}px; border-radius: 8px; border-top: 4px dashed ${strokeColor}; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: flex; flex-direction: column; justify-content: center; padding: 15px; box-sizing: border-box;">
                            <div style="font-size: 12px; font-weight: 700; color: ${strokeColor}; margin-bottom: 4px;">VACANT POSITION</div>
                            <div style="font-size: 15px; font-weight: 700; color: ${textColor}; word-break: break-word;">${d.data.designation}</div>
                            <div style="font-size: 12px; color: ${subColor}; margin-top: 4px;">Qty: ${d.data.vacantCount}</div>
                        </div>`;
                    }

                    return `
                    <div style="font-family: 'Inter', sans-serif; background-color: ${bgColor}; width: ${d.width}px; height: ${d.height}px; border-radius: 8px; border-left: 5px solid ${strokeColor}; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: flex; flex-direction: column; justify-content: center; padding: 15px; box-sizing: border-box;">
                        <div style="font-size: 15px; font-weight: 700; color: ${neon}; margin-bottom: 4px; word-break: break-word; line-height: 1.2;">
                            ${d.data.designation || 'Employee'}
                        </div>
                        <div style="font-size: 14px; color: ${textColor}; font-weight: 600;">${d.data.name}</div>
                        <div style="font-size: 12px; color: ${subColor}; margin-top: 2px;">ID: ${d.data.id} | ${d.data.department || ''}</div>
                        ${reporteeStr}
                        ${vacancyStr}
                    </div>
                    `;
                })
                .render();

            // Link styling callback provided by D3 Org Chart
            chart.linkUpdate(function (d, i, arr) {
                const isDark = !document.body.classList.contains('light-theme');
                d3.select(this)
                    .attr('stroke', isDark ? '#00ffff' : '#4f46e5')
                    .attr('stroke-width', 2)
                    .style('filter', isDark ? 'drop-shadow(0 0 5px #00ffff)' : 'none');
            });

            // Start collapsed by default
            setTimeout(() => {
                chart.collapseAll().fit();
                chart.expand(chart.data()[0]); // Expand just the root to show top level
            }, 100);
        }

        // Initialize
        loadData();
    </script>
</body>
</html>
