<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Organization Chart</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Essential Integrations -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-org-chart@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-flextree@2.1.2/build/d3-flextree.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            transition: background-color 0.3s;
        }

        body.dark-theme {
            background-color: #111827;
        }

        body.light-theme {
            background-color: #f3f4f6;
        }

        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: background-color 0.3s;
        }

        .dark-theme .header {
            background: #1f2937;
            color: #f9fafb;
        }

        .light-theme .header {
            background: white;
            color: #1f2937;
        }

        .header h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #4338ca;
        }

        .theme-toggle {
            background-color: white !important;
            color: #111827 !important;
            border: 1px solid #d1d5db !important;
        }

        .theme-toggle:hover {
            background-color: #f3f4f6 !important;
        }

        .chart-container {
            width: 100%;
            height: 100vh;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            font-weight: 600;
        }

        .dark-theme #loading {
            color: #f9fafb;
        }

        .light-theme #loading {
            color: #4b5563;
        }

        /* Neon connecting lines */
        .link {
            stroke: #00ffcc !important;
            stroke-width: 2.5px !important;
            filter: url(#neon-glow);
        }

        .chart-container svg {
            background-color: transparent !important;
        }
    </style>
</head>

<body class="dark-theme">
    <div class="header">
        <h1>Organization Chart</h1>
        <div class="controls">
            <button class="theme-toggle" onclick="toggleTheme()">Toggle Theme</button>
            <button onclick="if(window.chart) window.chart.fit()">Fit to Screen</button>
            <button onclick="if(window.chart) window.chart.expandAll().fit()">Expand All</button>
            <button onclick="if(window.chart) window.chart.collapseAll().fit()">Collapse All</button>
            <button onclick="downloadPNG()">Download PNG</button>
        </div>
    </div>
    <div id="loading">Loading Data from Google Sheets...</div>
    <div class="chart-container"></div>
    <script>
        window.chart = null;
        function toggleTheme() {
            const body = document.body;
            const isDark = body.classList.contains('dark-theme');
            body.classList.remove(isDark ? 'dark-theme' : 'light-theme');
            body.classList.add(isDark ? 'light-theme' : 'dark-theme');
            if (window.chart) window.chart.render();
        }
        function downloadPNG() {
            if (!window.chart) return;

            // Step 1: Inject neon glow SVG filter into chart's defs so it renders in export
            const svgEl = document.querySelector('.chart-container svg');
            if (svgEl) {
                let defs = svgEl.querySelector('defs');
                if (!defs) {
                    defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
                    svgEl.prepend(defs);
                }
                if (!defs.querySelector('#neon-glow')) {
                    const filter = document.createElementNS('http://www.w3.org/2000/svg', 'filter');
                    filter.setAttribute('id', 'neon-glow');
                    filter.setAttribute('x', '-50%');
                    filter.setAttribute('y', '-50%');
                    filter.setAttribute('width', '200%');
                    filter.setAttribute('height', '200%');
                    filter.innerHTML =
                        '<feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>' +
                        '<feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>';
                    defs.appendChild(filter);
                }

                // Step 2: Set SVG background to match current theme
                const isDark = document.body.classList.contains('dark-theme');
                const bgColor = isDark ? '#111827' : '#f3f4f6';
                svgEl.style.backgroundColor = bgColor;
            }

            const isDark = document.body.classList.contains('dark-theme');
            const bgColor = isDark ? '#111827' : '#f3f4f6';

            window.chart.exportImg({
                full: true,
                scale: 3,
                onAfterExport: function(dataUrl) {
                    // Reset SVG background after export
                    const s = document.querySelector('.chart-container svg');
                    if (s) s.style.backgroundColor = '';
                    const link = document.createElement('a');
                    link.download = 'Avaada_Org_Chart.png';
                    link.href = dataUrl;
                    link.click();
                }
            });
        }
    </script>
