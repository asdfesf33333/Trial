<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaada Nagpur Plant Org Chart</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Essential Integrations -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-org-chart@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-flextree@2.1.2/build/d3-flextree.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            transition: background-color 0.3s;
        }

        body.dark-theme {
            background-color: #111827;
        }

        body.light-theme {
            background-color: #f3f4f6;
        }

        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: background-color 0.3s;
        }

        .dark-theme .header {
            background: #1f2937;
            color: #f9fafb;
        }

        .light-theme .header {
            background: white;
            color: #1f2937;
        }

        .header h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #4338ca;
        }

        .theme-toggle {
            background-color: white !important;
            color: #111827 !important;
            border: 1px solid #d1d5db !important;
        }

        .theme-toggle:hover {
            background-color: #f3f4f6 !important;
        }

        .chart-container {
            width: 100%;
            height: 100vh;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            font-weight: 600;
        }

        .dark-theme #loading {
            color: #f9fafb;
        }

        .light-theme #loading {
            color: #4b5563;
        }

        /* Neon connecting lines */
        .link {
            stroke: #00ffcc !important;
            stroke-width: 2.5px !important;
            filter: url(#neon-glow);
        }

        .chart-container svg {
            background-color: transparent !important;
        }
    </style>
</head>

<body class="dark-theme">
    <div class="header">
        <h1>Avaada Nagpur Plant</h1>
        <div class="controls">
            <button class="theme-toggle" onclick="window.toggleTheme()">Toggle Theme</button>
            <button onclick="if(window.chart) window.chart.fit()">Fit to Screen</button>
            <button onclick="if(window.chart) window.chart.expandAll().fit()">Expand All</button>
            <button onclick="if(window.chart) window.chart.collapseAll().fit()">Collapse All</button>
            <button onclick="window.downloadPDF()">Download PDF</button>
        </div>
    </div>
    <div id="loading">Loading Org Chart Data...</div>
    <div class="chart-container">
    </div>

    <script>
        // Use window.chart to ensure global accessibility for buttons
        window.chart = null;

        // PDF Export functionality
        window.downloadPDF = function() {
            if (!window.chart) return;
            const { jsPDF } = window.jspdf;
            window.chart.exportImg({
                full: true,
                onAfterExport: (data) => {
                    const pdf = new jsPDF('l', 'px', [1600, 1000]);
                    pdf.addImage(data, 'PNG', 20, 20, 1560, 960);
                    pdf.save('Avaada_Nagpur_Org_Chart.pdf');
                }
            });
        };

        // Theme toggle
        window.toggleTheme = function() {
            const body = document.body;
            const isDark = body.classList.contains('dark-theme');
            body.classList.remove(isDark ? 'dark-theme' : 'light-theme');
            body.classList.add(isDark ? 'light-theme' : 'dark-theme');
            if (window.chart) window.chart.render();
        };

        // Google Sheet URLs (Base64 encoded)
        const mainUrl = atob("aHR0cHM6Ly9kb2NzLmdvb2dsZS5jb20vc3ByZWFkc2hlZXRzL2QvMXRZY25DVUc2Q2lZVkVFMUloZzN6QkNGLU9ZekhoN05hcEs1clRmYnE0QzQvZXhwb3J0P2Zvcm1hdD1jc3Y=");
        const powerUrl = atob("aHR0cHM6Ly9kb2NzLmdvb2dsZS5jb20vc3ByZWFkc2hlZXRzL2QvMXRZY25DVUc2Q2lZVkVFMUloZzN6QkNGLU9ZekhoN05hcEs1clRmYnE0QzQvZ3Zpei90cT90cXg9b3V0OmNzdiZzaGVldD1wb3dlcg==");
        const vacancyUrl = atob("aHR0cHM6Ly9kb2NzLmdvb2dsZS5jb20vc3ByZWFkc2hlZXRzL2QvMXRZY25DVUc2Q2lZVkVFMUloZzN6QkNGLU9ZekhoN05hcEs1clRmYnE0QzQvZ3Zpei90cT90cXg9b3V0OmNzdiZzaGVldD12YWNhbmN5");

        function cleanString(str) { return str ? str.trim().replace(/\s+/g, ' ') : "Unknown"; }

        Promise.all([
            new Promise((resolve, reject) => Papa.parse(mainUrl, { download: true, header: true, complete: resolve, error: reject })),
            new Promise((resolve, reject) => Papa.parse(powerUrl, { download: true, header: true, complete: resolve, error: reject })),
            new Promise((resolve, reject) => Papa.parse(vacancyUrl, { download: true, header: true, complete: resolve, error: reject }))
        ]).then(results => {
            document.getElementById('loading').style.display = 'none';
            const [mainData, powerData, vacancyData] = results.map(r => r.data);

            const powerMap = {};
            powerData.forEach(row => {
                const desig = row["Current Designation"];
                if (desig) powerMap[desig.trim().toUpperCase()] = {
                    level: parseInt(row["Level"]) || 99,
                    corresponding: (row["Corresponding"] || "").trim().toLowerCase()
                };
            });

            const deptMap = {};
            mainData.forEach(row => {
                const dept = cleanString(row["Current Department"]);
                if (dept && dept !== "Unknown") deptMap[dept] = { ph: cleanString(row["Phase"]), fn: cleanString(row["Functions"]) };
            });

            const vacancies = [];
            vacancyData.forEach(row => {
                const desig = (row["Designation "] || row["Designation"] || "").trim();
                const dept = (row["Department"] || "").trim();
                const count = parseInt(row["Number"]) || 0;
                const info = deptMap[dept] || { ph: "System", fn: "System" };
                for (let i = 0; i < count; i++) {
                    vacancies.push({
                        "Full Name": "Vacant Position", "Current Department": dept, "Current Designation": desig,
                        "Employee Id": `VAC_${dept}_${desig}_${i}`, "Phase": info.ph, "Functions": info.fn, "isVacancy": true
                    });
                }
            });

            const all = [...mainData, ...vacancies];
            const nodes = [];
            const nodeMap = new Set();
            const deptEmps = {};

            // PROJECT ROOT
            nodes.push({ id: "RootNode", parentId: null, name: "Avaada (Nagpur Plant)", type: "root" });
            nodeMap.add("RootNode");

            all.forEach(row => {
                const name = cleanString(row["Full Name"]);
                if (name === "Unknown" || !row["Employee Id"]) return;
                
                const desig = cleanString(row["Current Designation"]);
                const p = powerMap[desig.toUpperCase()] || { corresponding: "", level: 99 };
                const isFactoryHead = p.corresponding === "root";
                
                const [ph, fn, dt] = [cleanString(row["Phase"]), cleanString(row["Functions"]), cleanString(row["Current Department"])];
                const [phId, fnId, dtId] = [`Phase_${ph}`, `Phase_${ph}_Func_${fn}`, `Phase_${ph}_Func_${fn}_Dept_${dt}`];
                
                // Ensure Structural Nodes (Phase -> Function -> Dept) are created
                if (!nodeMap.has(phId)) { nodes.push({ id: phId, parentId: "RootNode", name: ph, type: "phase" }); nodeMap.add(phId); }
                if (!nodeMap.has(fnId)) { nodes.push({ id: fnId, parentId: phId, name: fn, type: "function" }); nodeMap.add(fnId); }
                if (!nodeMap.has(dtId)) { nodes.push({ id: dtId, parentId: fnId, name: dt, type: "department" }); nodeMap.add(dtId); }

                // Group employees by department to be children of the Dept Box
                if (!deptEmps[dtId]) deptEmps[dtId] = [];
                deptEmps[dtId].push({
                    id: `Emp_${row["Employee Id"]}`, name: name, designation: desig, 
                    level: p.level, type: row.isVacancy ? "vacancy" : "employee", employeeId: row["Employee Id"],
                    isFactoryHead: isFactoryHead
                });
            });

            // Put all employees under their department node
            Object.keys(deptEmps).forEach(dtId => {
                deptEmps[dtId].forEach(e => {
                    nodes.push({...e, parentId: dtId});
                });
            });

            const children = {};
            nodes.forEach(n => {
                if (n.parentId) { if(!children[n.parentId]) children[n.parentId]=[]; children[n.parentId].push(n.id); }
                n.reportees = 0; n.vacancies = 0;
            });

            function count(nid) {
                const node = nodes.find(n => n.id === nid);
                if (!node) return { r: 0, v: 0 };
                let [r, v] = [node.type === 'employee' ? 1 : 0, node.type === 'vacancy' ? 1 : 0];
                (children[nid] || []).forEach(cid => { const c = count(cid); r += c.r; v += c.v; });
                node.reportees = r; node.vacancies = v; return { r, v };
            }
            count("RootNode");

            window.chart = new d3.OrgChart()
                .container('.chart-container')
                .data(nodes)
                .nodeWidth(d => 260)
                .nodeHeight(d => 145)
                .childrenMargin(d => 40)
                .compactMarginBetween(d => 15)
                .compactMarginPair(d => 80)
                .nodeContent(function (d) {
                    const dark = document.body.classList.contains('dark-theme');
                    const [bg, t, s] = [dark ? '#1f2937' : '#ffffff', dark ? '#f9fafb' : '#1f2937', dark ? '#9ca3af' : '#4b5563'];
                    let c = '#FFFFFF', ttl = (d.data.designation || "").toUpperCase();
                    switch (d.data.type) {
                        case 'root': c = '#0ea5e9'; ttl = 'AVAADA NAGPUR'; break;
                        case 'phase': c = '#3b82f6'; ttl = 'PHASE'; break;
                        case 'function': c = '#f59e0b'; ttl = 'FUNCTION'; break;
                        case 'department': c = '#8b5cf6'; ttl = 'DEPARTMENT'; break;
                        case 'employee': c = d.data.isFactoryHead ? '#0ea5e9' : '#10b981'; break;
                        case 'vacancy': c = '#ef4444'; ttl = 'VACANT POSITION'; break;
                    }

                    const isEmpStyle = d.data.type === 'employee' || d.data.type === 'vacancy';
                    let mid = '';
                    if (isEmpStyle) {
                        // Standard Employee style
                        mid = `<div style="font-size: 15px; font-weight: 700; color: ${t}; margin-top: 8px;">${d.data.name}</div>
                               <div style="font-size: 12px; color: ${s};">${d.data.employeeId ? 'ID: ' + d.data.employeeId : ''}</div>`;
                    } else {
                        // Header style for Project/Phase/Function/Department
                        mid = `<div style="font-size: 16px; font-weight: 700; color: ${t}; line-height: 1.2; margin-top: 4px;">${d.data.name}</div>`;
                    }

                    const foot = `<div style="display:flex; justify-content:space-between; margin-top:12px; font-size:12px; font-weight:600; color:${s};">
                        <div><span style="color:#10b981; margin-right:4px;">&bull;</span>Reportees: ${d.data.reportees || 0}</div>
                        <div><span style="color:#ef4444; margin-right:4px;">&bull;</span>Vacancies: ${d.data.vacancies || 0}</div>
                    </div>`;

                    return `<div style="font-family: 'Inter', sans-serif; background-color: ${bg}; width: 260px; height: 145px; border-radius: 8px; border-top: 5px solid ${c}; padding: 15px; box-sizing: border-box; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);">
                        <div style="font-size: 11px; color: ${c}; font-weight: 700; letter-spacing: 0.05em; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;">${ttl}</div>
                        ${mid}
                        ${foot}
                    </div>`;
                })
                .render();

            // Inject the Filter into the Chart SVG to ensure it persists in export
            const svg = d3.select('.chart-container svg');
            if (svg.node()) {
                const defs = svg.select('defs').node() ? svg.select('defs') : svg.append('defs');
                defs.append('filter')
                    .attr('id', 'neon-glow')
                    .attr('x', '-100%')
                    .attr('y', '-100%')
                    .attr('width', '400%')
                    .attr('height', '400%')
                    .html('<feGaussianBlur stdDeviation="3.5" result="blur"></feGaussianBlur><feComposite in="blur" in2="SourceGraphic" operator="over"></feComposite>');
            }

            setTimeout(() => { if (window.chart) window.chart.collapseAll().fit(); }, 200);
        });
    </script>
</body>

</html>
