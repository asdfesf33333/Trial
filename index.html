<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Organization Chart</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Essential Integrations -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-org-chart@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-flextree@2.1.2/build/d3-flextree.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            transition: background-color 0.3s;
        }

        body.dark-theme {
            background-color: #111827;
        }

        body.light-theme {
            background-color: #f3f4f6;
        }

        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: background-color 0.3s;
        }

        .dark-theme .header {
            background: #1f2937;
            color: #f9fafb;
        }

        .light-theme .header {
            background: white;
            color: #1f2937;
        }

        .header h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        button:hover {
            background - color: #4338ca;
        }

        .theme-toggle {
            background - color: white !important;
            color: #111827 !important;
            border: 1px solid #d1d5db !important;
        }

        .theme-toggle:hover {
            background - color: #f3f4f6 !important;
        }

        .chart-container {
            width: 100%;
            height: 100vh;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            font-weight: 600;
        }

        .dark-theme #loading {
            color: #f9fafb;
        }

        .light-theme #loading {
            color: #4b5563;
        }

        /* Style for neon edges */
        .link {
            stroke: #00ffcc !important;
            stroke-width: 2px !important;
            filter: url(#neon-glow);
        }

        /* Ensure the chart container takes full background */
        .chart-container svg {
            background-color: transparent !important;
        }
    </style>
</head>

<body class="dark-theme">
    <div class="header">
        <h1>Organization Chart</h1>
        <div class="controls">
            <button class="theme-toggle" onclick="toggleTheme()">Toggle Theme</button>
            <button onclick="chart.fit()">Fit to Screen</button>
            <button onclick="chart.expandAll().fit()">Expand All</button>
            <button onclick="chart.collapseAll().fit()">Collapse All</button>
            <button onclick="downloadPDF()">Download PDF</button>
        </div>
    </div>
    <div id="loading">Loading Data from Google Sheets...</div>
    <div class="chart-container">
        <!-- SVG Filter for Neon Glow -->
        <svg style="height:0; width:0; position:absolute;">
            <defs>
                <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="2" result="coloredBlur"></feGaussianBlur>
                    <feMerge>
                        <feMergeNode in="coloredBlur"></feMergeNode>
                        <feMergeNode in="SourceGraphic"></feMergeNode>
                    </feMerge>
                </filter>
            </defs>
        </svg>
    </div>
    <script>
        function toggleTheme() {
            const body = document.body;
            const isDark = body.classList.contains('dark-theme');
            body.classList.remove(isDark ? 'dark-theme' : 'light-theme');
            body.classList.add(isDark ? 'light-theme' : 'dark-theme');
            if (window.chart) window.chart.render();
        }
    </script>
